unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

bind C-l send-keys 'C-l' # clear screen

# Press C-j to switch sessions using fzf
bind C-j display-popup -E "\
  tmux list-sessions -F '#S' |\
  fzf --reverse |\
  xargs tmux switch-client -t"

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

bind a setw synchronize-panes

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Plugins
# Use prefix + I to install plugins
# Use prefix + U to update plugins
# set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'xamut/tmux-network-bandwidth'

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g monitor-activity on
set -g bell-action none

# Start counting pane and windows from 1
set -g automatic-rename off
set -g base-index 1
set -g mouse on
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -s set-clipboard on
set -g allow-rename off
set -g allow-passthrough on
set -g renumber-windows on
setw -g pane-base-index 1

# Status bar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=#cdd6f4,bg=#1e1e2e'
set -g status-left ""
set -g status-right "􀛨   #{battery_percentage} | 􀫦  #{ram_percentage} | #{network_bandwidth} | 􀫥  #{cpu_percentage} "

# Inactive windows: muted, blends into bar
set -g window-status-style 'fg=#6c7086,bg=default'
set -g window-status-format ' #I: #W '

# Active window: bright, bold, unmistakable
set -g window-status-current-style 'fg=#1e1e2e,bg=#89b4fa,bold'
set -g window-status-current-format ' ▶ #I: #W '

# Pane borders
set -g pane-border-status bottom
set -g pane-border-indicators both
set -g pane-border-lines heavy
# Inactive pane border: subtle
set -g pane-border-style 'fg=#444444,bg=default'
set -g pane-border-format ' #P '

# Active pane border: bright, hard to miss
set -g pane-active-border-style 'fg=#00afff,bg=default,bold'

# Without this nvim lags after pressing escape
set -sg escape-time 0

bind -r K resize-pane -U 5
bind -r J resize-pane -D 5
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

run '~/.config/tmux/plugins/tpm/tpm'
